# Render.com manifest for deploying the Node.js app in this repository
# Adjust branch, env vars, and plans as needed before applying

services:
  - type: web
    name: slack-ai-agent
    env: node
    plan: free
    branch: main
    buildCommand: npm ci
    startCommand: node index.js
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: slack-ai-agent-db
          property: connectionString
      - key: STRIPE_API_KEY
        sync: false

  - type: cron
    name: nightly-task
    schedule: "0 2 * * *"
    command: "node scripts/nightly.js"

  - type: worker
    name: slack-ai-worker
    env: node
    plan: starter
    buildCommand: npm ci
    startCommand: node worker.js
    healthCheckPath: /healthz

databases:
  - name: slack-ai-agent-db
    postgresMajorVersion: "15"
    plan: starter

